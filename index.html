<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: white;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }

        .viewer-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .controls-panel {
            width: 300px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .control-section {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .control-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            display: block;
            color: #555;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 500;
        }

        .control-input, .slider-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 14px;
        }

        .slider-input {
            flex: 1;
        }

        .number-input {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 14px;
            text-align: center;
        }

        .control-input:focus, .slider-input:focus, .number-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
            border-color: #007bff;
        }

        .color-input {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .button.secondary {
            background: linear-gradient(45deg, #4CAF50, #45a049);
        }

        .button.secondary:hover {
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .preset-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .preset-name {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 12px;
        }

        .file-input {
            margin: 10px 0;
        }

        .file-input input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
        }

        .info-display {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.05);
            color: #333;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Arial', sans-serif;
            font-size: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #333;
            font-size: 18px;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-top: 4px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        canvas {
            display: block;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="viewer-container">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <div>Loading 3D Viewer...</div>
            </div>
            <div id="info" class="info-display">
                <div>Camera Position: (0, 0, 5)</div>
                <div>Camera Rotation: (0, 0, 0)</div>
                <div>Zoom: 1.00</div>
                <div>Model: Default Torus Knot</div>
            </div>
        </div>
        
        <div class="controls-panel">
            <div class="control-section">
                <h3>Camera Controls</h3>
                <div class="control-group">
                    <label>Position X</label>
                    <div class="slider-container">
                        <input type="range" id="posX" class="slider-input" min="-10" max="10" step="0.1" value="0">
                        <input type="number" id="posXNum" class="number-input" min="-10" max="10" step="0.1" value="0">
                    </div>
                </div>
                <div class="control-group">
                    <label>Position Y</label>
                    <div class="slider-container">
                        <input type="range" id="posY" class="slider-input" min="-10" max="10" step="0.1" value="0">
                        <input type="number" id="posYNum" class="number-input" min="-10" max="10" step="0.1" value="0">
                    </div>
                </div>
                <div class="control-group">
                    <label>Position Z</label>
                    <div class="slider-container">
                        <input type="range" id="posZ" class="slider-input" min="1" max="20" step="0.1" value="5">
                        <input type="number" id="posZNum" class="number-input" min="1" max="20" step="0.1" value="5">
                    </div>
                </div>
                <button id="resetCamera" class="button">Reset Camera View</button>
            </div>

            <div class="control-section">
                <h3>Material Properties</h3>
                <div class="control-group">
                    <label>Material Color</label>
                    <input type="color" id="materialColor" class="color-input" value="#4CAF50">
                </div>
                <div class="control-group">
                    <label>Metalness</label>
                    <div class="slider-container">
                        <input type="range" id="metalness" class="slider-input" min="0" max="1" step="0.01" value="0.1">
                        <input type="number" id="metalnessNum" class="number-input" min="0" max="1" step="0.01" value="0.1">
                    </div>
                </div>
                <div class="control-group">
                    <label>Roughness</label>
                    <div class="slider-container">
                        <input type="range" id="roughness" class="slider-input" min="0" max="1" step="0.01" value="0.8">
                        <input type="number" id="roughnessNum" class="number-input" min="0" max="1" step="0.01" value="0.8">
                    </div>
                </div>
                <div class="control-group">
                    <label>Transparency</label>
                    <div class="slider-container">
                        <input type="range" id="transparency" class="slider-input" min="0" max="1" step="0.01" value="1">
                        <input type="number" id="transparencyNum" class="number-input" min="0" max="1" step="0.01" value="1">
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Model Controls</h3>
                <div class="control-group">
                    <label>Model Scale</label>
                    <div class="slider-container">
                        <input type="range" id="modelScale" class="slider-input" min="0.5" max="3" step="0.1" value="1">
                        <input type="number" id="modelScaleNum" class="number-input" min="0.5" max="3" step="0.1" value="1">
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Model Library</h3>
                <div class="control-group">
                    <label>Load Model</label>
                    <select id="modelSelector" class="control-input">
                        <option value="default">Default Torus Knot</option>
                        <option value="cube">Cube</option>
                        <option value="sphere">Sphere</option>
                    </select>
                </div>
                <div class="file-input">
                    <label>Upload Custom Model</label>
                    <input type="file" id="fileUpload" accept=".gltf,.glb,.obj" />
                </div>
            </div>

            <div class="control-section">
                <h3>Save/Load Presets</h3>
                <div class="control-group">
                    <label>Preset Name</label>
                    <input type="text" id="presetName" class="preset-name" placeholder="Enter preset name">
                </div>
                <div class="preset-controls">
                    <button id="savePreset" class="button secondary">Save</button>
                    <button id="loadPreset" class="button secondary">Load</button>
                </div>
                <div class="control-group">
                    <label>Saved Presets</label>
                    <select id="presetSelector" class="control-input">
                        <option value="">Select a preset...</option>
                    </select>
                </div>
            </div>

            <div class="control-section">
                <h3>Lighting</h3>
                <div class="control-group">
                    <label>Light Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="lightIntensity" class="slider-input" min="0" max="3" step="0.1" value="0.8">
                        <input type="number" id="lightIntensityNum" class="number-input" min="0" max="3" step="0.1" value="0.8">
                    </div>
                </div>
                <div class="control-group">
                    <label>Ambient Light</label>
                    <div class="slider-container">
                        <input type="range" id="ambientLight" class="slider-input" min="0" max="1" step="0.01" value="0.6">
                        <input type="number" id="ambientLightNum" class="number-input" min="0" max="1" step="0.01" value="0.6">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Global state
        let state = {
            camera: null,
            scene: null,
            renderer: null,
            model: null,
            lights: {},
            zoom: 1,
            presets: JSON.parse(localStorage.getItem('viewerPresets') || '{}')
        };

        let mouseControls = {
            isDragging: false,
            isLeftButton: false,
            isRightButton: false,
            previousMousePosition: { x: 0, y: 0 }
        };

        // Utility functions
        function formatNumber(num) {
            return parseFloat(num).toFixed(2);
        }

        function radToDeg(rad) {
            return rad * (180 / Math.PI);
        }

        function updateCameraInfo() {
            if (state.camera) {
                const pos = state.camera.position;
                const rot = state.camera.rotation;
                const distance = state.camera.position.length();
                state.zoom = 5 / distance;
                
                document.getElementById('info').innerHTML = `
                    <div>Camera Position: (${formatNumber(pos.x)}, ${formatNumber(pos.y)}, ${formatNumber(pos.z)})</div>
                    <div>Camera Rotation: (${formatNumber(radToDeg(rot.x))}°, ${formatNumber(radToDeg(rot.y))}°, ${formatNumber(radToDeg(rot.z))}°)</div>
                    <div>Zoom: ${formatNumber(state.zoom)}</div>
                    <div>Model: Default Torus Knot</div>
                `;
            }
        }

        // Initialize Three.js
        function initThreeJS() {
            const container = document.querySelector('.viewer-container');
            
            // Scene
            state.scene = new THREE.Scene();
            state.scene.background = new THREE.Color(0xffffff);
            
            // Camera
            state.camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            state.camera.position.set(0, 0, 5);
            
            // Renderer
            state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            state.renderer.setSize(container.clientWidth, container.clientHeight);
            state.renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(state.renderer.domElement);
            
            // Lights
            state.lights.ambient = new THREE.AmbientLight(0x404040, 0.6);
            state.scene.add(state.lights.ambient);
            
            state.lights.directional = new THREE.DirectionalLight(0xffffff, 0.8);
            state.lights.directional.position.set(5, 5, 5);
            state.scene.add(state.lights.directional);
            
            // Model
            const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
            const material = new THREE.MeshStandardMaterial({
                color: 0x4CAF50,
                metalness: 0.1,
                roughness: 0.8,
                transparent: false,
                opacity: 1.0
            });
            
            state.model = new THREE.Mesh(geometry, material);
            state.scene.add(state.model);
            
            // Mouse controls
            setupMouseControls();
            
            // Start render loop
            animate();
            
            // Hide loading
            document.getElementById('loading').style.display = 'none';
        }

        function setupMouseControls() {
            const canvas = state.renderer.domElement;
            
            canvas.addEventListener('mousedown', (e) => {
                mouseControls.isDragging = true;
                mouseControls.isLeftButton = e.button === 0;
                mouseControls.isRightButton = e.button === 2;
                mouseControls.previousMousePosition = { x: e.clientX, y: e.clientY };
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (!mouseControls.isDragging) return;
                
                const deltaMove = {
                    x: e.clientX - mouseControls.previousMousePosition.x,
                    y: e.clientY - mouseControls.previousMousePosition.y
                };
                
                if (mouseControls.isLeftButton) {
                    // Left click: Rotate model
                    if (state.model) {
                        state.model.rotation.y += deltaMove.x * 0.01;
                        state.model.rotation.x += deltaMove.y * 0.01;
                    }
                } else if (mouseControls.isRightButton) {
                    // Right click: Orbit camera
                    const spherical = new THREE.Spherical();
                    spherical.setFromVector3(state.camera.position);
                    spherical.theta -= deltaMove.x * 0.01;
                    spherical.phi += deltaMove.y * 0.01;
                    spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
                    state.camera.position.setFromSpherical(spherical);
                    state.camera.lookAt(0, 0, 0);
                }
                
                mouseControls.previousMousePosition = { x: e.clientX, y: e.clientY };
                updateCameraInfo();
            });
            
            canvas.addEventListener('mouseup', () => {
                mouseControls.isDragging = false;
            });
            
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 1.1 : 0.9;
                state.camera.position.multiplyScalar(delta);
                
                const distance = state.camera.position.length();
                if (distance < 1) state.camera.position.normalize().multiplyScalar(1);
                if (distance > 50) state.camera.position.normalize().multiplyScalar(50);
                
                updateCameraInfo();
            });
            
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function animate() {
            requestAnimationFrame(animate);
            state.renderer.render(state.scene, state.camera);
            updateCameraInfo();
        }

        function setupControls() {
            // Slider-number sync function
            function syncSliderNumber(sliderId, numberId) {
                const slider = document.getElementById(sliderId);
                const number = document.getElementById(numberId);
                if (!slider || !number) return;
                
                slider.addEventListener('input', () => {
                    number.value = slider.value;
                });
                
                number.addEventListener('input', () => {
                    const value = parseFloat(number.value);
                    if (value >= parseFloat(slider.min) && value <= parseFloat(slider.max)) {
                        slider.value = value;
                        slider.dispatchEvent(new Event('input'));
                    }
                });
            }

            // Setup all slider-number pairs
            syncSliderNumber('posX', 'posXNum');
            syncSliderNumber('posY', 'posYNum');
            syncSliderNumber('posZ', 'posZNum');
            syncSliderNumber('metalness', 'metalnessNum');
            syncSliderNumber('roughness', 'roughnessNum');
            syncSliderNumber('transparency', 'transparencyNum');
            syncSliderNumber('modelScale', 'modelScaleNum');
            syncSliderNumber('lightIntensity', 'lightIntensityNum');
            syncSliderNumber('ambientLight', 'ambientLightNum');

            // Camera controls
            document.getElementById('posX').addEventListener('input', (e) => {
                state.camera.position.x = parseFloat(e.target.value);
            });
            
            document.getElementById('posY').addEventListener('input', (e) => {
                state.camera.position.y = parseFloat(e.target.value);
            });
            
            document.getElementById('posZ').addEventListener('input', (e) => {
                state.camera.position.z = parseFloat(e.target.value);
            });
            
            document.getElementById('resetCamera').addEventListener('click', () => {
                state.camera.position.set(0, 0, 5);
                document.getElementById('posX').value = 0;
                document.getElementById('posY').value = 0;
                document.getElementById('posZ').value = 5;
                document.getElementById('posXNum').value = 0;
                document.getElementById('posYNum').value = 0;
                document.getElementById('posZNum').value = 5;
            });

            // Material controls
            document.getElementById('materialColor').addEventListener('input', (e) => {
                if (state.model) {
                    state.model.material.color.setHex(e.target.value.replace('#', '0x'));
                }
            });
            
            document.getElementById('metalness').addEventListener('input', (e) => {
                if (state.model) {
                    state.model.material.metalness = parseFloat(e.target.value);
                }
            });
            
            document.getElementById('roughness').addEventListener('input', (e) => {
                if (state.model) {
                    state.model.material.roughness = parseFloat(e.target.value);
                }
            });
            
            document.getElementById('transparency').addEventListener('input', (e) => {
                if (state.model) {
                    const opacity = parseFloat(e.target.value);
                    state.model.material.opacity = opacity;
                    state.model.material.transparent = opacity < 1;
                }
            });

            // Model controls
            document.getElementById('modelScale').addEventListener('input', (e) => {
                if (state.model) {
                    const scale = parseFloat(e.target.value);
                    state.model.scale.set(scale, scale, scale);
                }
            });
            
            document.getElementById('modelSelector').addEventListener('change', (e) => {
                if (state.model) {
                    state.scene.remove(state.model);
                }
                
                let geometry;
                switch (e.target.value) {
                    case 'cube':
                        geometry = new THREE.BoxGeometry(2, 2, 2);
                        break;
                    case 'sphere':
                        geometry = new THREE.SphereGeometry(1.5, 32, 32);
                        break;
                    default:
                        geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
                }
                
                const material = new THREE.MeshStandardMaterial({
                    color: 0x4CAF50,
                    metalness: 0.1,
                    roughness: 0.8,
                    transparent: false,
                    opacity: 1.0
                });
                
                state.model = new THREE.Mesh(geometry, material);
                state.scene.add(state.model);
            });

            // File upload
            document.getElementById('fileUpload').addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    alert(`File "${e.target.files[0].name}" selected. Custom model loading will be implemented with GLTF/OBJ loaders.`);
                }
            });

            // Preset controls
            document.getElementById('savePreset').addEventListener('click', () => {
                const name = document.getElementById('presetName').value.trim();
                if (!name) {
                    alert('Please enter a preset name');
                    return;
                }
                
                const preset = {
                    camera: {
                        x: state.camera.position.x,
                        y: state.camera.position.y,
                        z: state.camera.position.z
                    },
                    material: {
                        color: state.model?.material.color.getHex(),
                        metalness: state.model?.material.metalness,
                        roughness: state.model?.material.roughness,
                        opacity: state.model?.material.opacity
                    }
                };
                
                state.presets[name] = preset;
                localStorage.setItem('viewerPresets', JSON.stringify(state.presets));
                loadPresetsList();
                alert(`Preset "${name}" saved!`);
            });
            
            document.getElementById('loadPreset').addEventListener('click', () => {
                const name = document.getElementById('presetName').value.trim();
                if (!name || !state.presets[name]) {
                    alert('Please enter a valid preset name');
                    return;
                }
                
                const preset = state.presets[name];
                
                // Apply settings
                if (preset.camera) {
                    state.camera.position.set(preset.camera.x, preset.camera.y, preset.camera.z);
                    document.getElementById('posX').value = preset.camera.x;
                    document.getElementById('posY').value = preset.camera.y;
                    document.getElementById('posZ').value = preset.camera.z;
                    document.getElementById('posXNum').value = preset.camera.x;
                    document.getElementById('posYNum').value = preset.camera.y;
                    document.getElementById('posZNum').value = preset.camera.z;
                }
                
                if (preset.material && state.model) {
                    state.model.material.color.setHex(preset.material.color);
                    state.model.material.metalness = preset.material.metalness;
                    state.model.material.roughness = preset.material.roughness;
                    state.model.material.opacity = preset.material.opacity;
                    state.model.material.transparent = preset.material.opacity < 1;
                    
                    document.getElementById('metalness').value = preset.material.metalness;
                    document.getElementById('roughness').value = preset.material.roughness;
                    document.getElementById('transparency').value = preset.material.opacity;
                    document.getElementById('metalnessNum').value = preset.material.metalness;
                    document.getElementById('roughnessNum').value = preset.material.roughness;
                    document.getElementById('transparencyNum').value = preset.material.opacity;
                }
                
                alert(`Preset "${name}" loaded!`);
            });
            
            document.getElementById('presetSelector').addEventListener('change', (e) => {
                if (e.target.value) {
                    document.getElementById('presetName').value = e.target.value;
                }
            });

            // Lighting controls
            document.getElementById('lightIntensity').addEventListener('input', (e) => {
                if (state.lights.directional) {
                    state.lights.directional.intensity = parseFloat(e.target.value);
                }
            });
            
            document.getElementById('ambientLight').addEventListener('input', (e) => {
                if (state.lights.ambient) {
                    state.lights.ambient.intensity = parseFloat(e.target.value);
                }
            });
        }

        function loadPresetsList() {
            const selector = document.getElementById('presetSelector');
            selector.innerHTML = '<option value="">Select a preset...</option>';
            
            Object.keys(state.presets).forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                selector.appendChild(option);
            });
        }

        // Initialize when page loads
        window.addEventListener('load', () => {
            // Wait a bit for Three.js to fully load
            setTimeout(() => {
                if (window.THREE) {
                    console.log('✅ Three.js loaded successfully');
                    initThreeJS();
                    setupControls();
                    loadPresetsList();
                    console.log('✅ 3D Model Viewer initialized successfully');
                } else {
                    console.error('❌ Three.js failed to load');
                    // Try loading Three.js manually
                    loadThreeJSManually();
                }
            }, 100);
        });

        // Backup function to load Three.js if it fails
        function loadThreeJSManually() {
            const script = document.createElement('script');
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
            script.onload = () => {
                console.log('✅ Three.js loaded manually');
                initThreeJS();
                setupControls();
                loadPresetsList();
                console.log('✅ 3D Model Viewer initialized successfully');
            };
            script.onerror = () => {
                console.error('❌ Failed to load Three.js manually');
                document.getElementById('loading').innerHTML =
